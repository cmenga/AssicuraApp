services:


  vehicle-police-service:
    build:
      context: ./backend/vehicle-police-service
      target: dev
    image: vehicle-police-service:dev
    volumes:
      - ./backend/vehicle-police-service/app:/app
    ports:
      - '8003:8001'
    networks:
      - assicura-app
    depends_on:
      - vehicle-police-db

  vehicle-police-db:
    image: postgres:18.1-alpine3.23
    container_name: vehicle-police-db
    volumes:
      - vehicle-police-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=vehicle_police
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
    networks:
      - assicura-app
    ports:
      - "5434:5432"

  # web-service:
  #   build: 
  #     context: ./frontend
